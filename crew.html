<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Crew Leaderboard · Altiora</title>
<link rel="stylesheet" href="style.css"/>
<style>
.page-hero{padding:60px 56px 44px}
.page-hero h1{font-size:clamp(38px,5vw,62px);font-weight:900;letter-spacing:-2px;margin-bottom:12px}
.page-hero p{font-size:16px;color:var(--muted);max-width:500px;line-height:1.7}
.lb-wrap{padding:0 56px 80px}
.tier-section{margin-bottom:52px}
.tier-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.tier-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tier-name{font-size:18px;font-weight:900;letter-spacing:-.3px}
.tier-threshold{font-size:12px;color:var(--muted);margin-top:3px}
.crew-table{display:flex;flex-direction:column;gap:10px}
.crew-row{display:flex;align-items:center;gap:16px;background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:16px;padding:18px 22px;transition:transform .22s,box-shadow .22s,border-color .2s;text-decoration:none;color:var(--text)}
.crew-row:hover{border-color:rgba(79,195,247,.3);transform:translateX(4px);box-shadow:0 10px 28px rgba(0,0,0,.4)}
.cr-rank{font-size:20px;font-weight:900;width:28px;text-align:center;flex-shrink:0}
.cr-avi{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.cr-meta{flex:1;min-width:0}
.cr-name{font-size:15px;font-weight:800;color:#fff}
.cr-members{font-size:11.5px;color:var(--muted);margin-top:2px}
.cr-bar-wrap{height:3px;background:rgba(255,255,255,.05);border-radius:100px;margin-top:8px;overflow:hidden;max-width:200px}
.cr-bar{height:100%;border-radius:100px}
.cr-alt{text-align:right;flex-shrink:0}
.cr-alt-num{font-size:18px;font-weight:900}
.cr-alt-label{font-size:10.5px;color:var(--muted2);margin-top:2px}
.create-crew-cta{background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.15);border-radius:20px;padding:36px;text-align:center;margin-top:44px}
.create-crew-cta h3{font-size:22px;font-weight:900;margin-bottom:10px}
.create-crew-cta p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.65}
.crew-rules{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:44px;margin-bottom:44px}
.crew-rule{background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:16px;padding:22px 20px}
.cr-icon{margin-bottom:12px;font-size:22px}
.cr-title{font-size:14px;font-weight:800;margin-bottom:7px;color:#fff}
.cr-desc{font-size:12.5px;color:var(--muted);line-height:1.6}
@media(max-width:860px){.page-hero,.lb-wrap{padding-left:20px;padding-right:20px}.crew-rules{grid-template-columns:1fr}}
</style>
</head>
