<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin · Altiora</title>
<link rel="stylesheet" href="style.css"/>
<style>
.admin-wrap { max-width: 1100px; margin: 0 auto; padding: 44px 40px 72px; }
.admin-top { display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
.admin-title { font-size: 36px; font-weight: 900; letter-spacing: -1.2px; margin: 0; }
.admin-nav { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.admin-nav button { text-decoration:none; }
.section-title { font-size: 18px; font-weight: 800; margin: 0 0 12px; }
.grid-3 { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:14px; }
.card {
  background: rgba(12,18,28,0.65);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid rgba(79,195,247,0.12);
  border-radius: 20px;
  padding: 20px 22px;
}
.metric-num { font-size: 30px; font-weight: 900; margin-top: 6px; }
.row-list { display:grid; grid-template-columns: 1fr; gap:12px; }
.row-grid { display:grid; grid-template-columns: repeat(6,minmax(0,1fr)); gap:10px; }
.row-grid-3 { display:grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap:10px; }
.row-grid-5 { display:grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap:10px; }
.label { font-size: 11px; color: var(--muted2); text-transform: uppercase; letter-spacing: .6px; }
.value { font-size: 14px; font-weight: 600; margin-top: 4px; word-break: break-word; }
.actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.empty-state { font-size: 14px; color: var(--muted); }
.form-grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:10px; }
.form-grid textarea { min-height: 90px; }
.admin-section { display:none; }
.admin-section.active { display:block; }

.light-mode {
  background: #f5f7fa;
  color: #111;
}
.light-mode .card {
  background: #fff;
  color: #111;
  border: 1px solid #ddd;
}
.light-mode p,
.light-mode span {
  color: #333;
}

@media (max-width: 900px) {
  .admin-wrap { padding: 36px 20px 80px; }
  .grid-3, .row-grid, .row-grid-3, .row-grid-5, .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav class="nav">
  <a href="admin.html" class="nav-logo"><img src="assets/logo/altiora-primary.png" alt="Altiora" onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('beforeend','ALT<em style=&quot;color:#4FC3F7;font-style:normal&quot;>I</em>ORA')"></a>
  <div class="nav-right">
    <button class="btn-nav-outline" onclick="toggleTheme()">Toggle Theme</button>
    <button class="btn-nav-outline" onclick="adminLogout()">Logout</button>
  </div>
</nav>

<div class="admin-wrap">
  <div id="admin-login" class="card" style="display:none;max-width:420px">
    <div class="row-list">
      <input id="admin-user" placeholder="Username" />
      <input id="admin-pass" type="password" placeholder="Password" />
      <button class="btn-nav" onclick="adminLogin()">Login</button>
    </div>
  </div>

  <div id="admin-content" style="display:none">
    <div class="admin-top">
      <h1 class="admin-title">Altiora Admin Panel</h1>
      <button class="btn-nav" onclick="exportDataPlaceholder()">Export Data</button>
    </div>

    <div class="admin-nav">
      <button class="btn-nav-outline" onclick="showSection('admin-dashboard')">Dashboard</button>
      <button class="btn-nav-outline" onclick="showSection('admin-bookings')">Bookings</button>
      <button class="btn-nav-outline" onclick="showSection('admin-users')">Users</button>
      <button class="btn-nav-outline" onclick="showSection('admin-trips')">Trips</button>
    </div>

    <section id="admin-dashboard" class="admin-section active">
      <div class="section-title">Dashboard</div>
      <div class="grid-3">
        <div class="card">
          <div class="label">Total Bookings</div>
          <div class="metric-num" id="totalBookings">0</div>
        </div>
        <div class="card">
          <div class="label">Total Revenue (Paid)</div>
          <div class="metric-num" id="totalRevenue">₹0</div>
        </div>
        <div class="card">
          <div class="label">Total Users</div>
          <div class="metric-num" id="totalUsers">0</div>
        </div>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="section-title" style="font-size:16px;margin-bottom:10px">Trip-wise Stats</div>
        <div id="tripStatsList" class="row-list"></div>
      </div>
    </section>

    <section id="admin-bookings" class="admin-section">
      <div class="section-title">Bookings</div>
      <div id="bookingsList" class="row-list"></div>
    </section>

    <section id="admin-users" class="admin-section">
      <div class="section-title">Users</div>
      <div id="usersList" class="row-list"></div>
    </section>

    <section id="admin-trips" class="admin-section">
      <div class="section-title">Trips</div>
      <div class="card" style="margin-bottom:12px">
        <div class="form-grid">
          <input id="trip-name" placeholder="Trip Name" />
          <input id="trip-price" type="number" placeholder="Price" min="0" />
          <input id="trip-seats" type="number" placeholder="Total Seats" min="1" value="10" />
          <select id="trip-category" style="background:rgba(255,255,255,.02);border:1px solid var(--border2);border-radius:10px;padding:10px;color:var(--text)">
            <option value="trek">trek</option>
            <option value="bike">bike</option>
            <option value="car">car</option>
          </select>
          <input id="trip-start-date" type="date" placeholder="Start Date" />
          <input id="trip-end-date" type="date" placeholder="End Date" />
          <input id="trip-location" placeholder="Location" />
          <textarea id="trip-description" placeholder="Description"></textarea>
        </div>
        <div class="actions" style="margin-top:12px">
          <button class="btn-nav" onclick="createTrip()">Create Trip</button>
        </div>
      </div>
      <div id="tripsList" class="row-list"></div>
    </section>
  </div>
</div>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script>
const adminLoginPanel = document.getElementById('admin-login');
const adminContent = document.getElementById('admin-content');
if (typeof db === 'undefined' || !db) {
  window.db = firebase.firestore();
}

if (localStorage.getItem("theme") === "light") {
  document.body.classList.add("light-mode");
}

if (localStorage.getItem("isAdmin") !== "true") {
  adminLoginPanel.style.display = 'block';
  adminContent.style.display = 'none';
} else {
  adminLoginPanel.style.display = 'none';
  adminContent.style.display = 'block';
  showSection('admin-dashboard');
  loadAdminData();
}

function toggleTheme() {
  document.body.classList.toggle("light-mode");
  localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
}

function adminLogin() {
  const user = document.getElementById("admin-user").value;
  const pass = document.getElementById("admin-pass").value;

  if (user === "Admin" && pass === "Altiora") {
    localStorage.setItem("isAdmin", "true");
    location.reload();
  } else {
    alert("Invalid credentials");
  }
}

function adminLogout() {
  localStorage.removeItem("isAdmin");
  window.location.href = "index.html";
}

function showSection(sectionId) {
  document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(sectionId);
  if (target) target.classList.add('active');
}

function exportDataPlaceholder() {
  alert('Export Data feature will be added soon.');
}

function formatDate(ts) {
  if (!ts || !ts.toDate) return '—';
  return ts.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function loadAdminData() {
  Promise.all([
    db.collection("bookings").get(),
    db.collection("users").get(),
    db.collection("trips").get()
  ]).then(([bookingSnap, userSnap, tripSnap]) => {
    console.log("Bookings:", bookingSnap.size);
    console.log("Users:", userSnap.size);
    console.log("Trips:", tripSnap.size);

    const bookings = bookingSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const users = userSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    const trips = tripSnap.docs.map(d => ({ id: d.id, ...d.data() }));

    renderDashboard(bookings, users, trips);
    renderBookings(bookings);
    renderUsers(users, bookings);
    renderTrips(trips);
  }).catch(err => {
    console.error("Firestore error:", err);
  });
}

function renderDashboard(bookings, users, trips) {
  const totalBookings = bookings.length;
  const totalRevenue = bookings.reduce((sum, b) => {
    if ((b.paymentStatus || '').toLowerCase() === 'paid') return sum + Number(b.price || 0);
    return sum;
  }, 0);

  document.getElementById('totalBookings').textContent = totalBookings;
  document.getElementById('totalRevenue').textContent = '₹' + totalRevenue.toLocaleString('en-IN');
  document.getElementById('totalUsers').textContent = users.length;

  const tripStatsMap = {};
  trips.forEach(t => {
    tripStatsMap[t.tripId || t.name || 'Trip'] = {
      tripId: t.tripId || '',
      tripName: t.name || 'Trip',
      startDate: t.startDate || '',
      totalSeats: Number(t.totalSeats || 10),
      status: t.status || 'upcoming',
      bookings: 0,
      revenue: 0
    };
  });
  bookings.forEach(b => {
    const key = b.tripId || b.tripName || b.trip || 'Unnamed Trip';
    if (!tripStatsMap[key]) {
      tripStatsMap[key] = {
        tripId: b.tripId || '',
        tripName: b.tripName || b.trip || 'Unnamed Trip',
        startDate: b.startDate || '',
        totalSeats: 10,
        status: 'upcoming',
        bookings: 0,
        revenue: 0
      };
    }
    tripStatsMap[key].bookings += 1;
    if ((b.paymentStatus || '').toLowerCase() === 'paid') {
      tripStatsMap[key].revenue += Number(b.price || 0);
    }
  });

  const tripStatsList = document.getElementById('tripStatsList');
  const entries = Object.entries(tripStatsMap);
  if (!entries.length) {
    tripStatsList.innerHTML = '<div class="empty-state">No data available</div>';
    return;
  }

  tripStatsList.innerHTML = '';
  entries.forEach(([_, stat]) => {
    const seatsLeft = (stat.totalSeats || 10) - stat.bookings;
    const daysLeft = stat.startDate ? Math.ceil((new Date(stat.startDate) - new Date()) / (1000 * 60 * 60 * 24)) : '—';
    const status = seatsLeft <= 0 ? 'Full' : ((stat.status || 'upcoming').toLowerCase() === 'upcoming' ? 'Upcoming' : 'Active');
    tripStatsList.innerHTML += `
      <div class="card">
        <div class="row-grid">
          <div><div class="label">Name</div><div class="value">${stat.tripName}</div></div>
          <div><div class="label">Trip ID</div><div class="value">${stat.tripId || '—'}</div></div>
          <div><div class="label">Departure</div><div class="value">${stat.startDate || '—'}</div></div>
          <div><div class="label">Days Left</div><div class="value">${typeof daysLeft === 'number' ? daysLeft : '—'}</div></div>
          <div><div class="label">Total bookings</div><div class="value">${stat.bookings}</div></div>
          <div><div class="label">Revenue</div><div class="value">₹${stat.revenue.toLocaleString('en-IN')}</div></div>
          <div><div class="label">Seats left</div><div class="value">${Math.max(seatsLeft, 0)}</div></div>
          <div><div class="label">Status</div><div class="value">${status}</div></div>
        </div>
      </div>`;
  });
}

function renderBookings(bookings) {
  const list = document.getElementById('bookingsList');
  const activeBookings = bookings.filter(b => (b.status || 'pending') === 'pending' || (b.paymentStatus || 'pending') !== 'paid');
  const historyBookings = bookings.filter(b => (b.status || '') === 'rejected' || (b.status || '') === 'approved' || (b.paymentStatus || '') === 'paid');

  if (!activeBookings.length && !historyBookings.length) {
    list.innerHTML = '<div class="card"><div class="empty-state">No data available</div></div>';
    return;
  }

  list.innerHTML = '';
  if (activeBookings.length) {
    list.innerHTML += '<div class="section-title" style="font-size:14px;margin-bottom:4px">Active Bookings</div>';
  }
  activeBookings.forEach(b => {
    list.innerHTML += `
      <div class="card">
        <div class="row-grid">
          <div><div class="label">User Email</div><div class="value">${b.userEmail || ''}</div></div>
          <div><div class="label">Trip</div><div class="value">${b.tripName || b.trip || ''}</div></div>
          <div><div class="label">Price</div><div class="value">₹${Number(b.price || 0).toLocaleString('en-IN')}</div></div>
          <div><div class="label">Status</div><div class="value" style="text-transform:capitalize">${b.status || ''}</div></div>
          <div><div class="label">Payment Status</div><div class="value" style="text-transform:capitalize">${b.paymentStatus || 'pending'}</div></div>
          <div><div class="label">Date</div><div class="value">${formatDate(b.createdAt)}</div></div>
        </div>
        <div class="actions">
          <button class="btn-nav-outline" onclick="updateStatus('${b.id}','approved')">Approve</button>
          <button class="btn-nav-outline" onclick="updateStatus('${b.id}','rejected')">Reject</button>
          <button class="btn-nav-outline" onclick="updatePayment('${b.id}','paid')">Mark Paid</button>
          <button class="btn-nav-outline" onclick="updatePayment('${b.id}','pending')">Mark Pending</button>
        </div>
      </div>`;
  });

  list.innerHTML += '<div class="section-title" style="font-size:14px;margin:12px 0 4px">History</div>';
  if (!historyBookings.length) {
    list.innerHTML += '<div class="card"><div class="empty-state">No data available</div></div>';
  } else {
    historyBookings.forEach(b => {
      list.innerHTML += `
      <div class="card">
        <div class="row-grid">
          <div><div class="label">User Email</div><div class="value">${b.userEmail || ''}</div></div>
          <div><div class="label">Trip</div><div class="value">${b.tripName || b.trip || ''}</div></div>
          <div><div class="label">Trip ID</div><div class="value">${b.tripId || ''}</div></div>
          <div><div class="label">Status</div><div class="value" style="text-transform:capitalize">${b.status || ''}</div></div>
          <div><div class="label">Payment</div><div class="value" style="text-transform:capitalize">${b.paymentStatus || ''}</div></div>
          <div><div class="label">Date</div><div class="value">${formatDate(b.createdAt)}</div></div>
        </div>
      </div>`;
    });
  }
}

function renderUsers(users, bookings) {
  const list = document.getElementById('usersList');
  if (!users.length && !bookings.length) {
    list.innerHTML = '<div class="card"><div class="empty-state">No data available</div></div>';
    return;
  }

  list.innerHTML = '';
  const userById = {};
  users.forEach(u => { userById[u.id] = u; });
  bookings.forEach(b => {
    const u = userById[b.userId] || {};
    list.innerHTML += `
      <div class="card">
        <div class="row-grid">
          <div><div class="label">Name</div><div class="value">${b.name || u.name || ''}</div></div>
          <div><div class="label">Email</div><div class="value">${u.email || b.userEmail || ''}</div></div>
          <div><div class="label">Phone</div><div class="value">${b.phone || u.phone || ''}</div></div>
          <div><div class="label">Trip ID</div><div class="value">${b.tripId || ''}</div></div>
          <div><div class="label">Payment Status</div><div class="value">${b.paymentStatus || ''}</div></div>
          <div><div class="label">Booking Status</div><div class="value">${b.status || ''}</div></div>
        </div>
      </div>`;
  });
}

function renderTrips(trips) {
  const list = document.getElementById('tripsList');
  if (!trips.length) {
    list.innerHTML = '<div class="card"><div class="empty-state">No data available</div></div>';
    return;
  }

  list.innerHTML = '';
  trips.forEach(t => {
    list.innerHTML += `
      <div class="card">
        <div class="row-grid">
          <div><div class="label">Name</div><div class="value">${t.name || ''}</div></div>
          <div><div class="label">Category</div><div class="value">${t.category || ''}</div></div>
          <div><div class="label">Leader</div><div class="value">${t.leader || ''}</div></div>
          <div><div class="label">Price</div><div class="value">₹${Number(t.price || 0).toLocaleString('en-IN')}</div></div>
          <div><div class="label">Total Seats</div><div class="value">${Number(t.totalSeats || 10)}</div></div>
          <div><div class="label">Booked Seats</div><div class="value">${Number(t.bookedSeats || 0)}</div></div>
          <div><div class="label">Start Date</div><div class="value">${t.startDate || '—'}</div></div>
          <div><div class="label">End Date</div><div class="value">${t.endDate || '—'}</div></div>
          <div><div class="label">Location</div><div class="value">${t.location || '—'}</div></div>
          <div><div class="label">Status</div><div class="value">${t.status || 'upcoming'}</div></div>
          <div><div class="label">Created</div><div class="value">${formatDate(t.createdAt)}</div></div>
        </div>
        <div class="actions">
          <button class="btn-nav-outline" onclick="deleteTrip('${t.id}')">Delete</button>
        </div>
      </div>`;
  });
}

function createTrip() {
  const name = (document.getElementById('trip-name').value || '').trim();
  const price = Number(document.getElementById('trip-price').value || 0);
  const totalSeats = Number(document.getElementById('trip-seats').value || 10);
  const category = (document.getElementById('trip-category').value || 'trek').trim();
  const startDate = (document.getElementById('trip-start-date').value || '').trim();
  const endDate = (document.getElementById('trip-end-date').value || '').trim();
  const location = (document.getElementById('trip-location').value || '').trim();
  const description = (document.getElementById('trip-description').value || '').trim();

  if (!name) {
    alert('Please enter a trip name.');
    return;
  }

  const prefix = category === 'trek' ? 'T' : category === 'bike' ? 'B' : 'C';
  const leader = category === 'trek' ? 'Rohit' : category === 'bike' ? 'Sarthak' : 'Vinod';

  db.collection("trips").get().then(snapshot => {
    let count = 0;
    snapshot.forEach(doc => {
      const t = doc.data();
      if ((t.category || '') === category) count += 1;
    });
    const tripId = prefix + String(count + 1).padStart(2, '0');
    const status = new Date(startDate) > new Date() ? 'upcoming' : 'active';
    return db.collection("trips").add({
      tripId,
      name,
      category,
      leader,
      startDate,
      endDate,
      totalSeats,
      bookedSeats: 0,
      price,
      status,
      location,
      description,
      createdAt: new Date()
    });
  }).then(() => {
    document.getElementById('trip-name').value = '';
    document.getElementById('trip-price').value = '';
    document.getElementById('trip-seats').value = '10';
    document.getElementById('trip-category').value = 'trek';
    document.getElementById('trip-start-date').value = '';
    document.getElementById('trip-end-date').value = '';
    document.getElementById('trip-location').value = '';
    document.getElementById('trip-description').value = '';
    loadAdminData();
  }).catch(err => {
    console.error("Firestore error:", err);
    alert('Could not create trip.');
  });
}

function deleteTrip(id) {
  db.collection("trips").doc(id).delete().then(loadAdminData).catch(err => {
    console.error("Firestore error:", err);
  });
}

function updateStatus(id, status) {
  db.collection('bookings').doc(id).update({ status }).then(loadAdminData).catch(err => {
    console.error("Firestore error:", err);
  });
}

function updatePayment(id, value) {
  db.collection('bookings').doc(id).update({ paymentStatus: value }).then(loadAdminData).catch(err => {
    console.error("Firestore error:", err);
  });
}
</script>
</body>
</html>
