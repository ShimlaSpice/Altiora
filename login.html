<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign In — Altiora</title>
<link rel="stylesheet" href="style.css"/>
<style>
.login-wrap{display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.login-left{background:url('https://images.unsplash.com/photo-1572791254854-30deda22b89e?w=1200&q=85') center/cover no-repeat;position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:48px}
.login-left-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(4,8,15,.15) 0%,rgba(4,8,15,.88) 100%)}
.login-left-content{position:relative;z-index:1}
.login-right{background:var(--bg2);display:flex;align-items:center;justify-content:center;padding:48px 40px}
.login-form-wrap{width:100%;max-width:400px}
@media(max-width:860px){.login-wrap{grid-template-columns:1fr}.login-left{min-height:280px;padding:32px 24px}.login-right{padding:36px 24px}}
</style>
</head>
<body>
<nav class="nav scrolled" style="position:absolute">
  <a href="index.html" class="nav-logo">ALT<span>I</span>ORA</a>
  <div class="nav-right"><a href="signup.html" class="btn-nav">Join Free</a></div>
</nav>
<div class="login-wrap">
  <div class="login-left">
    <div class="login-left-overlay"></div>
    <div class="login-left-content">
      <div style="font-family:var(--font-d);font-size:clamp(26px,3vw,40px);font-weight:700;color:#fff;line-height:1.15;letter-spacing:-1px;margin-bottom:10px">The mountains<br><em style="color:var(--gold)">remember.</em></div>
      <p style="font-size:13px;color:rgba(238,242,247,.55);font-weight:300;max-width:300px;line-height:1.6">Sign in to view your altitude score, track your crew, and manage expedition bookings.</p>
    </div>
  </div>
  <div class="login-right">
    <div class="login-form-wrap">
      <div style="font-family:var(--font-d);font-size:26px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-1px">Welcome back</div>
      <p style="font-size:13px;color:var(--muted);margin-bottom:28px">Sign in to your Altiora account</p>
      <div class="form-group">
        <label class="form-label">Email or Altiora ID</label>
        <input type="text" class="form-input" placeholder="you@gmail.com or AL-2604XXXX"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" placeholder="Your password"/>
      </div>
      <div style="text-align:right;margin-top:-10px;margin-bottom:20px">
        <a href="#" style="font-size:12px;color:var(--muted2);text-decoration:none">Forgot password?</a>
      </div>
      <button onclick="window.location.href='dashboard.html'" style="width:100%;padding:15px;border-radius:10px;background:var(--fire);color:#fff;border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:var(--font-b);transition:all .25s;box-shadow:0 5px 22px rgba(232,93,38,.35)">Sign In →</button>
      <p style="text-align:center;margin-top:18px;font-size:13px;color:var(--muted)">New to Altiora? <a href="signup.html" style="color:var(--gold);text-decoration:none;font-weight:600">Create free account</a></p>
      <div style="text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border2);font-size:12px;color:var(--muted2)">
        Or sign in via <a href="https://wa.me/918800000000" style="color:var(--green);text-decoration:none;font-weight:600">WhatsApp →</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
